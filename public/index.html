<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Web</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <button class="btn-new" id="btnNewConv">+ New Conversation</button>
      </div>
      <div class="sidebar-list" id="convList"></div>
      <div class="sidebar-empty" id="sidebarEmpty">No conversations yet.</div>
    </aside>

    <!-- Main Chat -->
    <main class="chat" id="chat">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-welcome">
          <div class="welcome-icon">👋</div>
          <h2>你好，我是 Claude</h2>
          <p class="welcome-subtitle">有什么可以帮助您的吗？</p>
        </div>
        <p class="chat-warning">⚠️ All tool permissions are bypassed</p>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-bar" id="chatInputBar">
        <textarea id="chatInput" placeholder="Type your message..." rows="1" disabled></textarea>
        <button id="btnSend" disabled>Send</button>
      </div>
    </main>

    <!-- Floating status -->
    <div class="status" id="status"></div>
  </div>

  <!-- Pet selector -->
  <button class="pet-selector-btn" id="petSelectorBtn" title="桌宠">🐾</button>
  <div class="pet-selector-menu" id="petSelectorMenu" hidden>
    <button data-pet="off">关闭</button>
    <button data-pet="killua">奇犽</button>
    <button data-pet="other" disabled>其他角色（敬请期待）</button>
  </div>

  <!-- Pet stage -->
  <div class="pet-stage" id="petStage" hidden></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/pet/pet.js"></script>
  <script src="/app.js"></script>
</body>
</html>
