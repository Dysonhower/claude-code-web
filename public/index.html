<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Web</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>Claude Web</h1>
      <span class="header-badge">--dangerously-skip-permissions</span>
      <button class="btn-new" id="btnNewConv">+ New Conversation</button>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-list" id="convList"></div>
      <div class="sidebar-empty" id="sidebarEmpty">No conversations yet.</div>
    </aside>

    <!-- Main Chat -->
    <main class="chat" id="chat">
      <div class="chat-empty" id="chatEmpty">
        <h2>Claude Web</h2>
        <p>Create a new conversation to get started.</p>
        <p class="chat-warning">All tool permissions are bypassed.</p>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-bar" id="chatInputBar">
        <textarea id="chatInput" placeholder="Type your message..." rows="1" disabled></textarea>
        <button id="btnSend" disabled>Send</button>
      </div>
    </main>

    <!-- Floating status -->
    <div class="status" id="status"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
